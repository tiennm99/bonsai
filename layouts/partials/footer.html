{{- if site.Params.footer | default true -}}
<footer class="bonsai-footer">
  {{- with site.Params.footerText -}}
    <p>{{ . | safeHTML }}</p>
  {{- else -}}
    <p>© {{ now.Year }} {{ site.Params.name | default site.Title }}</p>
  {{- end -}}
  {{- if site.Params.themeToggle -}}
    {{ partial "theme-toggle-button.html" . }}
  {{- end -}}
</footer>
{{- end -}}
